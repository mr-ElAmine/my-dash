name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"clearCache": false}'
