name: CI

on:
  pull_request:
    branches: [develop, main]

jobs:
  backend-checks:
    name: Backend Lint + Typecheck + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mydash_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Tests
        run: pnpm run test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/mydash_test
          JWT_SECRET: test-secret
          JWT_EXPIRES_IN: 86400
          NODE_ENV: test
