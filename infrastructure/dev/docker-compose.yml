services:
  postgres:
    image: postgres:17-alpine
    container_name: mydash-dev-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mydash
      POSTGRES_PASSWORD: mydash
      POSTGRES_DB: mydash_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mydash -d mydash_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: mydash-dev-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit
    container_name: mydash-dev-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres_dev_data:
