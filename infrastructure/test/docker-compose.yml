services:
  postgres:
    image: postgres:17-alpine
    container_name: mydash-test-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: mydash
      POSTGRES_PASSWORD: mydash
      POSTGRES_DB: mydash_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mydash -d mydash_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: mydash-test-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
